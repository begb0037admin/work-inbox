<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oxford Inbox Briefing</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-size: 13px; }

/* Layout */
.shell { display: flex; height: 100vh; overflow: hidden; }

/* Sidebar */
.sidebar {
  width: 320px;
  flex-shrink: 0;
  background: #002147;
  color: #fff;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  padding: 24px 20px 32px;
}
.sidebar-brand { display: flex; flex-direction: column; align-items: center; text-align: center; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.15); margin-bottom: 20px; }
.sidebar-brand img { width: 88px; height: 88px; object-fit: contain; margin-bottom: 12px; }
.sidebar-brand .uni-title { font-size: 13px; font-weight: 600; letter-spacing: 0.04em; color: #fff; line-height: 1.4; }
.sidebar-brand .section-title { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.55); margin-top: 4px; }

.sidebar-meta { margin-bottom: 20px; }
.meta-row { display: flex; flex-direction: column; margin-bottom: 10px; }
.meta-label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.45); margin-bottom: 2px; }
.meta-value { font-size: 12px; color: rgba(255,255,255,0.85); line-height: 1.4; }

.sidebar-section { margin-bottom: 20px; }
.sidebar-section-title { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,0.45); margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }

.cal-item { margin-bottom: 8px; padding: 8px 10px; background: rgba(255,255,255,0.08); border-radius: 5px; border-left: 3px solid rgba(255,255,255,0.3); }
.cal-time { font-size: 10px; color: rgba(255,255,255,0.5); margin-bottom: 2px; }
.cal-title { font-size: 12px; color: #fff; font-weight: 500; line-height: 1.3; }
.cal-sub { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 2px; }
.cal-alert { font-size: 10px; color: #fbbf24; margin-top: 3px; }
.cal-empty { font-size: 11px; color: rgba(255,255,255,0.35); font-style: italic; }

.absence-pill { display: inline-block; background: rgba(255,255,255,0.12); border-radius: 12px; padding: 3px 9px; font-size: 11px; color: rgba(255,255,255,0.75); margin: 2px 2px 2px 0; }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #f5f3ef; }

.topbar { background: #fff; border-bottom: 1px solid #e0ddd8; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.topbar-left h1 { font-size: 20px; font-weight: 600; color: #1a1916; }
.topbar-left .sub { font-size: 12px; color: #8a8680; margin-top: 2px; }
.topbar-right { display: flex; gap: 8px; align-items: center; }

.btn { font-family: inherit; font-size: 11px; padding: 6px 14px; border-radius: 5px; border: 1px solid #ccc; background: #fff; color: #555; cursor: pointer; transition: background 0.15s; }
.btn:hover { background: #f0ede8; }
.btn-green { background: #166534; color: #fff; border-color: #166534; }
.btn-green:hover { background: #15803d; }
.btn-outline { background: #fff; color: #555; border-color: #ccc; }

.content { flex: 1; overflow-y: auto; padding: 24px 32px 60px; }

/* Context bar */
.context-bar { background: #fef3c7; border: 1px solid #fcd34d; border-radius: 7px; padding: 11px 14px; margin-bottom: 24px; font-size: 12px; color: #92400e; line-height: 1.6; }

/* Section */
.section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #9a9590; margin: 24px 0 10px; display: flex; align-items: center; gap: 8px; }
.section-label:first-child { margin-top: 0; }
.section-label::after { content: ''; flex: 1; height: 1px; background: #e0ddd8; }
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot-red { background: #c0392b; }
.dot-amber { background: #d97706; }
.dot-blue { background: #1a5fa8; }
.dot-gray { background: #9a9590; }

/* Cards */
.item {
  background: #fff;
  border: 1px solid #e0ddd8;
  border-radius: 8px;
  padding: 11px 14px;
  margin-bottom: 6px;
  display: flex;
  gap: 11px;
  position: relative;
  overflow: hidden;
  transition: opacity 0.3s;
}
.item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
.item.urgent::before { background: #c0392b; }
.item.needs::before { background: #d97706; }
.item.fyi::before { background: #1a5fa8; }
.item.low::before { background: #9a9590; }
.item.item-hidden { display: none; }
.item.item-done { opacity: 0.4; }
.item.item-done .item-title { text-decoration: line-through; }

.cb-wrap { padding-top: 2px; flex-shrink: 0; }
.cb { width: 15px; height: 15px; border-radius: 4px; border: 1px solid #ccc; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
.cb:hover { border-color: #666; }
.cb.checked { background: #1a1916; border-color: #1a1916; }
.cb.checked::after { content: ''; width: 4px; height: 7px; border: 1.5px solid #fff; border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); display: block; }

.item-body { flex: 1; min-width: 0; }
.item-title { font-size: 13px; font-weight: 500; color: #1a1916; margin-bottom: 3px; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; line-height: 1.4; }
.badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; white-space: nowrap; }
.badge-red { background: #fde8e8; color: #c0392b; }
.badge-yellow { background: #fef3c7; color: #92400e; }
.badge-blue { background: #dbeafe; color: #1e40af; }
.badge-gray { background: #f3f2ef; color: #6b7280; }
.item-sub { font-size: 12px; color: #5a5750; line-height: 1.55; }
.item-open { font-size: 11px; color: #1a5fa8; text-decoration: none; cursor: pointer; margin-top: 4px; display: inline-block; }
.item-open:hover { text-decoration: underline; }

/* Priority actions */
.priority-list { list-style: none; }
.priority-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 12px; background: #fff; border: 1px solid #e0ddd8; border-radius: 7px; margin-bottom: 5px; }
.priority-num { flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%; background: #002147; color: #fff; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
.priority-text { flex: 1; font-size: 12px; color: #1a1916; line-height: 1.5; }
.priority-date { font-size: 10px; padding: 2px 7px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
.priority-open { font-size: 11px; color: #1a5fa8; text-decoration: none; cursor: pointer; margin-left: 6px; }
.priority-open:hover { text-decoration: underline; }

/* Archive panel */
.archive-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; }
.archive-overlay.open { display: flex; align-items: flex-end; justify-content: flex-end; }
.archive-panel { background: #fff; width: 420px; height: 100vh; overflow-y: auto; padding: 24px; box-shadow: -4px 0 20px rgba(0,0,0,0.15); }
.archive-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.archive-header h2 { font-size: 16px; font-weight: 600; }
.archive-close { font-size: 20px; cursor: pointer; color: #888; background: none; border: none; font-family: inherit; }
.archive-item { padding: 10px 12px; border: 1px solid #e0ddd8; border-radius: 7px; margin-bottom: 8px; cursor: pointer; }
.archive-item:hover { background: #f5f3ef; }
.archive-item .arc-date { font-size: 11px; font-weight: 600; color: #002147; }
.archive-item .arc-sub { font-size: 11px; color: #888; margin-top: 2px; }
.archive-empty { font-size: 12px; color: #999; text-align: center; padding: 40px 0; }

/* Loading/error */
.status-msg { text-align: center; padding: 60px 0; color: #9a9590; font-size: 13px; }
</style>
</head>

<script>
const BRIEFING_URL = 'https://raw.githubusercontent.com/begb0037admin/work-inbox/main/data/briefing.json';
const STORAGE_KEY  = 'workInbox_briefings_v1';
const DONE_KEY     = 'workInbox_done_v1';
const TICKS_KEY    = 'workInbox_ticks_v1';

let currentBriefing = null;
let showingDone = false;

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  let data = null;

  // Fetch from GitHub
  try {
    const res = await fetch(BRIEFING_URL + '?t=' + Date.now());
    if (res.ok) {
      data = await res.json();
      // Save to archive storage
      let archive = getArchive();
      const key = data.date || new Date().toDateString();
      archive[key] = data;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(archive));
    }
  } catch(e) {}

  // Fallback: latest from archive
  if (!data) {
    const archive = getArchive();
    const keys = Object.keys(archive);
    if (keys.length) data = archive[keys[keys.length - 1]];
  }

  if (!data) {
    document.getElementById('loading-msg').textContent = 'No briefing available. Run fetch_inbox.py to generate one.';
    return;
  }

  currentBriefing = data;

  // Safety reset: if done state exists and would hide everything, clear it
  const doneSet = getDoneSet();
  const allSections = ['urgent','needs','fyi','low'];
  let totalItems = 0;
  let hiddenItems = 0;
  for (const s of allSections) {
    const items = data[s] || [];
    totalItems += items.length;
    for (const item of items) {
      if (doneSet.has(item.subject || item.title)) hiddenItems++;
    }
  }
  if (totalItems > 0 && hiddenItems === totalItems) {
    localStorage.removeItem(DONE_KEY);
    localStorage.removeItem(TICKS_KEY);
    location.reload();
    return;
  }

  render(data);
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(data) {
  // Sidebar
  document.getElementById('sb-date').textContent = data.date || '—';
  document.getElementById('main-greeting').textContent = getGreeting();
  const datePart = data.date || '';
  const subPart  = data.subtitle || '';
  document.getElementById('main-subtitle').textContent = datePart + (datePart && subPart ? ' \u00b7 ' : '') + subPart;

  renderCalSection('sb-cal-today',    data.calToday    || []);
  renderCalSection('sb-cal-tomorrow', data.calTomorrow || []);
  renderAbsences(data.absences || []);

  // Main content
  const content = document.getElementById('main-content');
  content.innerHTML = '';

  // Context bar
  if (data.context) {
    const cb = document.createElement('div');
    cb.className = 'context-bar';
    cb.innerHTML = data.context;
    content.appendChild(cb);
  }

  const doneSet = getDoneSet();

  // Card sections
  const sections = [
    { key: 'urgent', label: 'Urgent', dotClass: 'dot-red',   itemClass: 'urgent' },
    { key: 'needs',  label: 'Needs Response', dotClass: 'dot-amber', itemClass: 'needs' },
    { key: 'fyi',    label: 'FYI', dotClass: 'dot-blue',  itemClass: 'fyi' },
    { key: 'low',    label: 'Low Priority', dotClass: 'dot-gray',  itemClass: 'low' },
  ];

  for (const sec of sections) {
    const items = data[sec.key] || [];
    if (!items.length) continue;

    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.innerHTML = '<span class="dot ' + sec.dotClass + '"></span>' + sec.label;
    content.appendChild(lbl);

    items.forEach((item, idx) => {
      const id = sec.key + '_' + idx;
      const subjectKey = item.subject || item.title || id;
      const isDone = doneSet.has(subjectKey);

      const div = document.createElement('div');
      div.className = 'item ' + sec.itemClass + (isDone ? ' item-done' : '') + (isDone && !showingDone ? ' item-hidden' : '');
      div.id = 'item_' + id;

      const badgeType = item.badgeType || 'gray';
      const badgeHtml = item.badge ? '<span class="badge badge-' + badgeType + '">' + esc(item.badge) + '</span>' : '';
      let openHtml = '';
      if (item.entry_id) {
        openHtml = '<br><a class="item-open" href="openmail://' + encodeURIComponent(item.entry_id) + '/">Open in Outlook</a>';
      }

      div.innerHTML =
        '<div class="cb-wrap"><div class="cb' + (isDone ? ' checked' : '') + '" onclick="toggleTick(\'' + esc(id) + '\',\'' + escQ(subjectKey) + '\')"></div></div>' +
        '<div class="item-body">' +
          '<div class="item-title">' + esc(item.title) + badgeHtml + '</div>' +
          '<div class="item-sub">' + (item.sub || '') + openHtml + '</div>' +
        '</div>';

      content.appendChild(div);
    });
  }

  // Priority actions
  const priorities = data.priorities || [];
  if (priorities.length) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.innerHTML = '<span class="dot dot-blue"></span>Priority Actions';
    content.appendChild(lbl);

    const ul = document.createElement('ul');
    ul.className = 'priority-list';

    priorities.forEach((p, i) => {
      const li = document.createElement('li');
      li.className = 'priority-item';
      const dateType = p.dateType || 'gray';
      const dateHtml = p.date ? '<span class="priority-date badge-' + dateType + ' badge">' + esc(p.date) + '</span>' : '';
      let openHtml = '';
      if (p.entry_id) {
        openHtml = '<a class="priority-open" href="openmail://' + encodeURIComponent(p.entry_id) + '/">Open</a>';
      }
      li.innerHTML =
        '<div class="priority-num">' + (i+1) + '</div>' +
        '<div class="priority-text">' + esc(p.text) + openHtml + '</div>' +
        dateHtml;
      ul.appendChild(li);
    });

    content.appendChild(ul);
  }
}

// ── Calendar ──────────────────────────────────────────────────────────────────
function renderCalSection(elId, items) {
  const el = document.getElementById(elId);
  if (!items.length) { el.innerHTML = '<span class="cal-empty">Nothing scheduled</span>'; return; }
  el.innerHTML = items.map(c =>
    '<div class="cal-item">' +
      '<div class="cal-time">' + esc(c.time || '') + '</div>' +
      '<div class="cal-title">' + esc(c.title) + '</div>' +
      (c.sub   ? '<div class="cal-sub">'   + esc(c.sub)   + '</div>' : '') +
      (c.alert ? '<div class="cal-alert">' + esc(c.alert) + '</div>' : '') +
    '</div>'
  ).join('');
}

function renderAbsences(absences) {
  const el = document.getElementById('sb-absences');
  if (!absences.length) { el.innerHTML = '<span class="cal-empty">None noted</span>'; return; }
  el.innerHTML = absences.map(a => '<span class="absence-pill">' + esc(a) + '</span>').join('');
}

// ── Tick ──────────────────────────────────────────────────────────────────────
function toggleTick(id, subjectKey) {
  const doneSet = getDoneSet();
  const item = document.getElementById('item_' + id);
  const cb = item ? item.querySelector('.cb') : null;

  if (doneSet.has(subjectKey)) {
    // Untick
    doneSet.delete(subjectKey);
    saveDoneSet(doneSet);
    if (item) {
      item.classList.remove('item-done', 'item-hidden');
      if (cb) cb.classList.remove('checked');
    }
  } else {
    // Tick
    doneSet.add(subjectKey);
    saveDoneSet(doneSet);
    if (cb) cb.classList.add('checked');
    if (item) item.classList.add('item-done');
    setTimeout(() => {
      if (!showingDone && item) item.classList.add('item-hidden');
    }, 1500);
  }
}

// ── Show Done ─────────────────────────────────────────────────────────────────
function toggleShowDone() {
  showingDone = !showingDone;
  document.getElementById('btn-show-done').textContent = showingDone ? 'Hide done' : 'Show done';
  document.querySelectorAll('.item.item-done').forEach(el => {
    if (showingDone) el.classList.remove('item-hidden');
    else el.classList.add('item-hidden');
  });
}

// ── Archive ───────────────────────────────────────────────────────────────────
function openArchive() {
  const overlay = document.getElementById('archive-overlay');
  const listEl  = document.getElementById('archive-list');
  const archive = getArchive();
  const keys = Object.keys(archive).reverse();

  if (!keys.length) {
    listEl.innerHTML = '<div class="archive-empty">No past briefings stored.</div>';
  } else {
    listEl.innerHTML = keys.map(k => {
      const b = archive[k];
      const total = (b.urgent||[]).length + (b.needs||[]).length + (b.fyi||[]).length + (b.low||[]).length;
      return '<div class="archive-item" onclick="loadArchiveBriefing(\'' + escQ(k) + '\')">' +
        '<div class="arc-date">' + esc(k) + '</div>' +
        '<div class="arc-sub">' + total + ' items' + (b.subtitle ? ' &mdash; ' + esc(b.subtitle) : '') + '</div>' +
      '</div>';
    }).join('');
  }

  overlay.classList.add('open');
}

function closeArchive() { document.getElementById('archive-overlay').classList.remove('open'); }
function closeArchiveOnBg(e) { if (e.target === document.getElementById('archive-overlay')) closeArchive(); }

function loadArchiveBriefing(key) {
  const archive = getArchive();
  if (archive[key]) { currentBriefing = archive[key]; render(archive[key]); }
  closeArchive();
}

// ── Storage helpers ───────────────────────────────────────────────────────────
function getDoneSet() {
  try { return new Set(JSON.parse(localStorage.getItem(DONE_KEY) || '[]')); }
  catch(e) { return new Set(); }
}
function saveDoneSet(set) {
  localStorage.setItem(DONE_KEY, JSON.stringify([...set]));
}
function getArchive() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch(e) { return {}; }
}

// ── Escape helpers ────────────────────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escQ(str) {
  if (!str) return '';
  return String(str).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}

// ── Greeting ──────────────────────────────────────────────────────────────────
function getGreeting() {
  // UK local time
  const hour = new Date().toLocaleString('en-GB', { timeZone: 'Europe/London', hour: 'numeric', hour12: false }) * 1;
  if (hour >= 5  && hour < 12) return 'Good morning, Kevin';
  if (hour >= 12 && hour < 18) return 'Good afternoon, Kevin';
  return 'Good evening, Kevin';
}

// ── Boot ──────────────────────────────────────────────────────────────────────
init();
</script>
