      <div class="date-label">Today</div>
      <div class="wi-clock-time" id="wi-clock-time"></div>
      <div class="date-val" id="sidebarDate"></div>
    </div>

    <div class="sb-section">Calendar – today</div>
    <div id="calTodaySidebar"></div>

    <div class="sb-section" id="calTomorrowLabel">Calendar – tomorrow</div>
    <div id="calTomorrowSidebar"></div>

    <div class="sb-section">Absences</div>
    <div class="abs-wrap" id="absencesSidebar"></div>

    <div class="tasks-widget-section">Tasks<span class="tasks-live-dot" id="tasksLiveDot"></span></div>
    <div class="tasks-widget-panel" id="tasksWidget">
      <div class="tasks-widget-unavailable">Loading...</div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="page-header">
      <div>
        <div class="page-title" id="pageTitle">Inbox briefing</div>
        <div class="header-date" id="headerDate"></div>
      </div>
      <div class="header-actions">
        <button class="btn" id="btn-show-done" onclick="toggleShowDone()">Show done</button>
        <button class="btn" onclick="toggleArchive()">Archive</button>
      </div>
    </div>

    <div id="contextBar"></div>
    <div id="inboxCol"></div>
    <div class="footer">All outgoing communication requires Kevin's review and sign-off before sending</div>
  </div>
</div>

<!-- Import panel -->
<div class="import-panel" id="importPanel">
  <label>Paste JSON briefing and click Load</label>
  <textarea id="importInput" placeholder='{"date":"Monday 9 June 2026","urgent":[...],...}'></textarea>
  <div class="import-actions">
    <button class="btn btn-primary" onclick="loadFromImport()">Load briefing</button>
    <button class="btn" onclick="toggleImport()">Cancel</button>
  </div>
  <div class="import-error" id="importError">Invalid JSON – please check and try again.</div>
</div>

<!-- Archive panel -->
<div class="archive-panel" id="archivePanel">
  <div class="archive-panel-title">Archive</div>
  <div id="archiveList"></div>
  <div class="archive-actions" id="archiveActions" style="display:none">
    <button class="btn btn-primary" onclick="exportArchiveMd()">Export .md</button>
    <div class="archive-purge-row">
      <span>Purge older than</span>
      <input type="number" id="purgeDays" value="30" min="1">
      <span>days</span>
      <button class="btn" style="color:var(--red);border-color:var(--red-border)" onclick="purgeOldTicks()">Purge</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script></body>
