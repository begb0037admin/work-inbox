<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inbox Briefing</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --oxford: #002147; --sidebar-bg: #002147; --main-bg: #f5f7fb; --card-bg: #ffffff;
  --text-dark: #1a2740; --text-muted: #7a8a9e; --text-very-muted: #b0b8c8;
  --sidebar-width: 320px;
  --red: #e24b4a; --red-bg: #fdf0ee; --red-border: rgba(192,57,43,0.2); --red-text: #a32d2d;
  --yellow: #ca8a04; --yellow-bg: #fefce8; --yellow-border: #fde047; --yellow-text: #713f12;
  --blue: #1a5fa8; --blue-bg: #edf4fc; --blue-border: rgba(26,95,168,0.2); --blue-text: #185fa5;
  --gray: #888780; --gray-bg: #f2efe8; --gray-border: rgba(0,0,0,0.12); --gray-text: #5f5e5a;
  --font: 'Inter', sans-serif;
}
html, body { height: 100%; font-family: var(--font); background: var(--main-bg); color: var(--text-dark); font-size: 15px; }
.shell { display: flex; min-height: 100vh; }
.sidebar { width: 320px; flex-shrink: 0; background: #002147; color: #e2e8f0; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; padding-bottom: 24px; }
.sidebar-logo { padding: 28px 22px 22px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 16px; }
.sidebar-crest { width: 88px; height: 88px; object-fit: contain; flex-shrink: 0; }
.uni-name { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: 0.01em; line-height: 1.2; }
.dept-name { font-size: 12px; font-weight: 500; letter-spacing: 0.08em; color: rgba(255,255,255,0.45); text-transform: uppercase; margin-top: 4px; }
.sb-email-block { padding: 14px 22px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.sb-email-link { font-size: 14px; color: #60a5fa; text-decoration: none; }
.sb-email-link:hover { text-decoration: underline; }
.sb-block { padding: 16px 22px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.sb-label { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.32); margin-bottom: 6px; }
.sb-value { font-size: 14px; color: rgba(255,255,255,0.75); }
.sb-link { font-size: 14px; color: #60a5fa; text-decoration: none; }
.sb-link:hover { text-decoration: underline; }
.sb-section-label { font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.32); padding: 20px 22px 8px; }
.cal-item { padding: 7px 22px; border-left: 3px solid transparent; margin-bottom: 1px; }
.cal-item.active { border-left-color: #60a5fa; background: rgba(96,165,250,0.08); }
.cal-time { font-size: 12px; color: rgba(255,255,255,0.38); margin-bottom: 2px; }
.cal-title { font-size: 14px; color: rgba(255,255,255,0.82); line-height: 1.35; font-weight: 500; }
.cal-sub { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 1px; }
.abs-wrap { padding: 4px 22px 8px; }
.abs-pill { display: inline-block; font-size: 12px; color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.08); border-radius: 4px; padding: 3px 8px; margin: 3px 3px 0 0; }
.main { margin-left: 320px; flex: 1; padding: 38px 42px; overflow-y: auto; }
.page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; gap: 16px; }
.page-title { font-size: 22px; font-weight: 700; color: var(--oxford); letter-spacing: 0.01em; }
.page-subtitle { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
.header-actions { display: flex; gap: 10px; flex-shrink: 0; }
.btn { font-family: var(--font); font-size: 13px; padding: 8px 18px; border-radius: 6px; border: 1px solid #d1d9e6; background: var(--card-bg); color: var(--text-muted); cursor: pointer; transition: background .15s; font-weight: 500; }
.btn:hover { background: #eef1f7; color: var(--text-dark); }
.btn-green { background: #2e7d32; color: #fff; border-color: #2e7d32; }
.btn-green:hover { opacity: .88; }
.btn-primary { background: var(--oxford); color: #fff; border-color: var(--oxford); }
.btn-primary:hover { opacity: .88; }
.context-bar { background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; padding: 14px 18px; margin-bottom: 28px; font-size: 14px; color: #78350f; line-height: 1.6; }
.context-bar strong { font-weight: 600; }
.sec-head { display: flex; align-items: center; gap: 14px; margin: 28px 0 14px; }
.sec-head:first-of-type { margin-top: 0; }
.sec-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-r { background: var(--red); } .dot-y { background: #eab308; } .dot-b { background: var(--blue); } .dot-g { background: var(--gray); }
.sec-lbl { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap; }
.sec-rule { flex: 1; height: 1px; background: #d1d9e6; }
.card-link { text-decoration: none; color: inherit; display: block; cursor: pointer; }
.card-link:hover .card { border-color: #a0aec0; box-shadow: 0 2px 8px rgba(0,33,71,0.1); }
.card { background: var(--card-bg); border: 1px solid rgba(0,33,71,0.07); border-radius: 10px; padding: 14px 18px; margin-bottom: 8px; display: flex; gap: 12px; align-items: flex-start; box-shadow: 0 1px 4px rgba(0,33,71,0.06); transition: opacity .2s; animation: fadeIn .18s ease both; }
.card.done { opacity: .38; } .card.done .card-title { text-decoration: line-through; }
.card-accent { width: 3px; border-radius: 2px; flex-shrink: 0; align-self: stretch; min-height: 40px; }
.ac-r { background: var(--red); } .ac-y { background: #eab308; } .ac-b { background: var(--blue); } .ac-g { background: var(--gray); }
.cb-wrap { padding-top: 2px; flex-shrink: 0; }
.cb { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid #d1d9e6; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s; }
.cb:hover { border-color: var(--text-muted); }
.cb.checked { background: var(--oxford); border-color: var(--oxford); }
.cb.checked::after { content: ''; width: 4px; height: 8px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); display: block; }
.card-body { flex: 1; min-width: 0; }
.card-title { font-size: 15px; font-weight: 600; color: var(--text-dark); margin-bottom: 5px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; line-height: 1.4; }
.card-sub { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
.card-sub strong { color: var(--text-dark); font-weight: 600; }
.badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; }
.badge-red { background: var(--red-bg); color: var(--red-text); border: 1px solid var(--red-border); }
.badge-yellow { background: var(--yellow-bg); color: var(--yellow-text); border: 1px solid var(--yellow-border); }
.badge-blue { background: var(--blue-bg); color: var(--blue-text); border: 1px solid var(--blue-border); }
.badge-gray { background: var(--gray-bg); color: var(--gray-text); border: 1px solid var(--gray-border); }
.priority-row { background: var(--card-bg); border: 1px solid rgba(0,33,71,0.07); border-radius: 10px; padding: 11px 16px 11px 19px; margin-bottom: 6px; display: flex; align-items: center; gap: 12px; font-size: 14px; cursor: pointer; position: relative; overflow: hidden; transition: opacity .2s; box-shadow: 0 1px 4px rgba(0,33,71,0.05); }
.priority-row::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--red); }
.priority-row.done { opacity: .35; text-decoration: line-through; }
.priority-num { font-size: 11px; font-weight: 700; color: var(--text-very-muted); width: 16px; flex-shrink: 0; text-align: center; }
.priority-text { flex: 1; color: var(--text-dark); font-weight: 500; }
.priority-date { font-size: 11px; font-weight: 700; white-space: nowrap; padding: 3px 8px; border-radius: 4px; }
.date-red { color: var(--red-text); background: var(--red-bg); border: 1px solid var(--red-border); }
.date-yellow { color: var(--yellow-text); background: var(--yellow-bg); border: 1px solid var(--yellow-border); }
.date-blue { color: var(--blue-text); background: var(--blue-bg); border: 1px solid var(--blue-border); }
.date-gray { color: var(--gray-text); background: var(--gray-bg); border: 1px solid var(--gray-border); }
.no-items { font-size: 14px; color: var(--text-very-muted); font-style: italic; padding: 4px 0; }
.import-panel { display: none; position: fixed; top: 80px; right: 48px; width: 440px; background: var(--card-bg); border: 1px solid #c8d0dc; border-radius: 10px; padding: 20px; box-shadow: 0 8px 32px rgba(0,33,71,0.12); z-index: 100; }
.import-panel.visible { display: block; }
.import-panel label { font-size: 13px; color: var(--text-muted); display: block; margin-bottom: 10px; font-weight: 500; }
.import-panel textarea { width: 100%; height: 120px; background: var(--main-bg); border: 1px solid #d1d9e6; border-radius: 6px; color: var(--text-dark); font-family: var(--font); font-size: 13px; padding: 10px; resize: none; outline: none; }
.import-panel textarea:focus { border-color: var(--oxford); }
.import-actions { display: flex; gap: 10px; margin-top: 12px; }
.import-error { font-size: 12px; color: var(--red); margin-top: 8px; display: none; }
.archive-panel { display: none; position: fixed; top: 80px; right: 48px; width: 400px; background: var(--card-bg); border: 1px solid #c8d0dc; border-radius: 10px; padding: 20px; box-shadow: 0 8px 32px rgba(0,33,71,0.12); z-index: 100; max-height: 60vh; overflow-y: auto; }
.archive-panel.visible { display: block; }
.archive-entry { padding: 12px 14px; border: 1px solid rgba(0,33,71,0.07); border-radius: 6px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: border-color .15s; }
.archive-entry:hover { border-color: #a0aec0; }
.archive-date { font-size: 14px; font-weight: 500; }
.archive-meta { font-size: 12px; color: var(--text-very-muted); }
.archive-load { font-size: 12px; color: var(--blue); }
.footer { font-size: 12px; color: var(--text-very-muted); text-align: center; margin-top: 48px; padding-top: 16px; border-top: 1px solid #e2e8f0; letter-spacing: .04em; }
@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>

  </div>
</div>
<div class="archive-panel" id="archivePanel">
  <div id="archiveList"></div>
</div>
<script>
const STORAGE_KEY='workInbox_briefings_v1',TODAY_KEY='workInbox_today_v1',TICKS_KEY='workInbox_ticks_v1';

function getStore(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}')}catch(e){return{}}}
function saveStore(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}
function getTicks(){try{return JSON.parse(localStorage.getItem(TICKS_KEY)||'{}')}catch(e){return{}}}
function saveTicks(t){localStorage.setItem(TICKS_KEY,JSON.stringify(t))}
var currentData=null,currentKey=null;

function toggleImport(){
  document.getElementById('importPanel').classList.toggle('visible');
  document.getElementById('archivePanel').classList.remove('visible');
  document.getElementById('importError').style.display='none';
}
function toggleArchive(){
  var p=document.getElementById('archivePanel');
  p.classList.toggle('visible');
  if(p.classList.contains('visible')) renderArchiveList();
}
function loadFromImport(){
  var raw=document.getElementById('importInput').value.trim();
  var err=document.getElementById('importError'); err.style.display='none';
  var data; try{data=JSON.parse(raw)}catch(e){err.style.display='block';return;}
  if(!data.date){err.textContent='Missing date field.';err.style.display='block';return;}
  var key=data.date.replace(/[^a-zA-Z0-9]/g,'_');
  var store=getStore(); store[key]=data; saveStore(store);
  localStorage.setItem(TODAY_KEY,key);
  document.getElementById('importPanel').classList.remove('visible');
  document.getElementById('importInput').value='';
  renderBriefing(data,key);
}
function clearToday(){
  if(!confirm('Clear today and return to seed data?')) return;
  localStorage.removeItem(TODAY_KEY);
  renderBriefing(SEED,'seed');
}
function renderArchiveList(){
  var store=getStore(),keys=Object.keys(store).sort().reverse();
  var el=document.getElementById('archiveList');
  if(!keys.length){el.innerHTML='<div class="no-items">No archived briefings yet.</div>';return;}
  el.innerHTML=keys.map(function(k){
    var d=store[k];
    return '<div class="archive-entry" onclick="loadArchive(\''+k+'\')"><div><div class="archive-date">'+d.date+'</div><div class="archive-meta">'+(d.urgent||[]).length+' urgent &middot; '+(d.needs||[]).length+' needs response</div></div><div class="archive-load">Load &rarr;</div></div>';
  }).join('');
}
function loadArchive(key){
  var store=getStore(); if(!store[key]) return;
  renderBriefing(store[key],key);
  document.getElementById('archivePanel').classList.remove('visible');
}
function toggleTick(id){
  var ticks=getTicks(),k=currentKey+'_'+id;
  ticks[k]=!ticks[k]; saveTicks(ticks);
  var cb=document.getElementById('cb_'+id);
  var item=document.getElementById('item_'+id);
  var prow=document.getElementById('prow_'+id);
  if(cb) cb.classList.toggle('checked',ticks[k]);
  if(item) item.classList.toggle('done',ticks[k]);
  if(prow) prow.classList.toggle('done',ticks[k]);
}
function isTicked(id){if(!currentKey) return false; return !!getTicks()[currentKey+'_'+id];}
function badgeHTML(text,type){
  if(!text) return '';
  return '<span class="badge badge-'+(type||'gray')+'">'+text+'</span>';
}
function acClass(cls){
  if(cls==='urgent') return 'ac-r';
  if(cls==='needs') return 'ac-y';
  if(cls==='fyi') return 'ac-b';
  return 'ac-g';
}
function openEmail(entryId,ev){ev.preventDefault();ev.stopPropagation();window.location.href='openmail://'+entryId;}
function renderItems(items,cls){
  if(!items||!items.length) return '<div class="no-items">None today.</div>';
  return items.map(function(item,i){
    var id=cls+'_'+i,ticked=isTicked(id);
    var hasLink=item.entry_id&&item.entry_id.length>0;
    var h='';
    if(hasLink) h+='<a class="card-link" href="#" onclick="openEmail(\''+item.entry_id+'\',event)">';
    h+='<div class="card'+(ticked?' done':'')+'" id="item_'+id+'">';
    h+='<div class="cb-wrap"><div class="cb'+(ticked?' checked':'')+'" id="cb_'+id+'" onclick="toggleTick(\''+id+'\');event.preventDefault();event.stopPropagation()"></div></div>';
    h+='<div class="card-accent '+acClass(cls)+'"></div>';
    h+='<div class="card-body">';
    h+='<div class="card-title">'+item.title+' '+badgeHTML(item.badge,item.badgeType);
    if(hasLink) h+='<span style="font-size:10px;color:#1a5fa8;margin-left:6px;font-weight:500;opacity:0.7">Open ÔåÆ</span>';
    h+='</div>';
    if(item.sub) h+='<div class="card-sub">'+item.sub+'</div>';
    h+='</div></div>';
    if(hasLink) h+='</a>';
    return h;
  }).join('');
}
function renderSidebarCal(items,cid){
  var el=document.getElementById(cid);
  if(!el) return;
  if(!items||!items.length){el.innerHTML='<div style="padding:4px 22px 10px;font-size:13px;color:rgba(255,255,255,0.3);font-style:italic">None</div>';return;}
  el.innerHTML=items.map(function(c,i){
    var h='<div class="cal-item'+(i===0?' active':'')+'">';
    if(c.time) h+='<div class="cal-time">'+c.time+'</div>';
    h+='<div class="cal-title">'+c.title+'</div>';
    if(c.sub) h+='<div class="cal-sub">'+c.sub+'</div>';
    if(c.alert) h+='<div style="font-size:11px;color:#fbbf24;margin-top:2px;font-weight:600">&#9888; '+c.alert+'</div>';
    h+='</div>';
    return h;
  }).join('');
}
function renderPriorities(items){
  if(!items||!items.length) return '';
  var h='<div class="sec-head"><span class="sec-dot dot-r"></span><span class="sec-lbl">Priority actions</span><span class="sec-rule"></span></div>';
  h+=items.map(function(p,i){
    var id='priority_'+i,ticked=isTicked(id);
    var dtype=p.dateType||'gray';
    var r='<div class="priority-row'+(ticked?' done':'')+'" id="prow_'+id+'" onclick="toggleTick(\''+id+'\')">';
    r+='<span class="priority-num">'+(i+1)+'</span>';
    r+='<span class="priority-text">'+p.text+'</span>';
    r+='<span class="priority-date date-'+dtype+'">'+(p.date||'')+'</span>';
    r+='</div>';
    return r;
  }).join('');
  return h;
}
function renderBriefing(data,key){
  currentData=data; currentKey=key;
  document.getElementById('headerDate').textContent=data.date+(data.subtitle?' \u00b7 '+data.subtitle:'');
  document.getElementById('sidebarDate').textContent=data.date||'';
  renderSidebarCal(data.calToday,'calTodaySidebar');
  renderSidebarCal(data.calTomorrow,'calTomorrowSidebar');
  var absEl=document.getElementById('absencesSidebar');
  absEl.innerHTML=(data.absences&&data.absences.length)
    ?data.absences.map(function(a){return '<span class="abs-pill">'+a+'</span>';}).join('')
    :'<span style="font-size:13px;color:rgba(255,255,255,0.3);font-style:italic">None recorded</span>';
  document.getElementById('contextBar').innerHTML=data.context
    ?'<div class="context-bar"><strong>Context:</strong> '+data.context+'</div>':'';
  var left='';
  left+='<div class="sec-head"><span class="sec-dot dot-r"></span><span class="sec-lbl">Urgent &mdash; action required today</span><span class="sec-rule"></span></div>';
  left+=renderItems(data.urgent,'urgent');
  left+='<div class="sec-head"><span class="sec-dot dot-y"></span><span class="sec-lbl">Needs response &mdash; within 24&ndash;48 hrs</span><span class="sec-rule"></span></div>';
  left+=renderItems(data.needs,'needs');
  if(data.fyi&&data.fyi.length){
    left+='<div class="sec-head"><span class="sec-dot dot-b"></span><span class="sec-lbl">FYI &mdash; no action needed</span><span class="sec-rule"></span></div>';
    left+=renderItems(data.fyi,'fyi');
  }
  if(data.low&&data.low.length){
    left+='<div class="sec-head"><span class="sec-dot dot-g"></span><span class="sec-lbl">Low priority / noise</span><span class="sec-rule"></span></div>';
    left+=renderItems(data.low,'low');
  }
  left+=renderPriorities(data.priorities);
  document.getElementById('inboxCol').innerHTML=left;
}
var BRIEFING_URL='https://raw.githubusercontent.com/begb0037admin/work-inbox/main/data/briefing.json';
(function init(){
  document.getElementById('inboxCol').innerHTML='<div style="padding:40px 0;color:#9a9590;font-size:14px">Fetching briefing...</div>';
  fetch(BRIEFING_URL+'?t='+Date.now())
    .then(function(r){if(!r.ok)throw new Error('fetch failed '+r.status);return r.json();})
    .then(function(data){
      var key=data.date.replace(/[^a-zA-Z0-9]/g,'_');
      var store=getStore(); store[key]=data; saveStore(store);
      localStorage.setItem(TODAY_KEY,key);
      renderBriefing(data,key);
    })
    .catch(function(){
      var todayKey=localStorage.getItem(TODAY_KEY);
      if(todayKey){var store=getStore(); if(store[todayKey]){renderBriefing(store[todayKey],todayKey);return;}}
      document.getElementById('inboxCol').innerHTML='<div style="padding:40px 0;color:#9a9590;font-size:14px">No briefing - run fetch_inbox.py to generate.</div>';
    });
})();

</script>
</body>
</html>
